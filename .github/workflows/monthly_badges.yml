# .github/workflows/monthly_badges.yml
name: monthly_badges

on:
  schedule:
    # Run every day at 01:00 UTC – safe default; the function itself
    # always targets the last full month unless you override.
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  call-edge-fn:
    runs-on: ubuntu-latest

    steps:
      - name: Hit monthly_badges Edge Function
        run: |
          curl -sS -X POST \
            "https://okcujzmlpwijjxwhuehe.supabase.co/functions/v1/monthly_badges" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}'
